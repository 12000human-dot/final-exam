<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>문서 뷰어</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: 'Noto Sans KR', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  .viewer-header {
    background: #0d2240;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .back-btn {
    background: rgba(255,255,255,.12);
    border: none;
    color: #fff;
    font-size: 18px;
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    text-decoration: none;
  }
  .back-btn:hover { background: rgba(255,255,255,.22); }
  .doc-title {
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .page-info { color: rgba(255,255,255,.7); font-size: 12px; white-space: nowrap; }
  .nav-btn {
    background: rgba(255,255,255,.12);
    border: none; color: #fff;
    font-size: 16px;
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: rgba(255,255,255,.22); }
  .nav-btn:disabled { opacity: .35; cursor: default; }

  .viewer-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 8px;
    gap: 8px;
    -webkit-overflow-scrolling: touch;
  }

  #loading {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    color: rgba(255,255,255,.8);
    font-size: 13px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,.2);
    border-top-color: #1e5bb5;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  canvas {
    display: block;
    max-width: 100%;
    border-radius: 4px;
    box-shadow: 0 2px 16px rgba(0,0,0,.4);
    background: #fff;
  }

  .error-msg {
    color: #ff6b6b;
    font-size: 13px;
    text-align: center;
    padding: 20px;
  }
</style>
</head>
<body>

<div class="viewer-header">
  <div class="header-left">
    <a class="back-btn" href="index.html">←</a>
    <div class="doc-title" id="docTitle">문서 로딩 중...</div>
  </div>
  <div class="header-right">
    <button class="nav-btn" id="prevBtn" onclick="changePage(-1)" disabled>‹</button>
    <span class="page-info" id="pageInfo">- / -</span>
    <button class="nav-btn" id="nextBtn" onclick="changePage(1)" disabled>›</button>
  </div>
</div>

<div class="viewer-body" id="viewerBody">
  <div id="loading">
    <div class="spinner"></div>
    <span>PDF 로딩 중...</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const params = new URLSearchParams(window.location.search);
  const file = params.get('file') || '';
  const title = params.get('title') || file;

  document.getElementById('docTitle').textContent = title;
  document.title = title;

  let pdfDoc = null;
  let currentPage = 1;
  let totalPages = 0;
  let rendering = false;

  const viewerBody = document.getElementById('viewerBody');
  const pageInfo = document.getElementById('pageInfo');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  function getScale() {
    const vw = window.innerWidth;
    if (vw <= 480) return vw / 600;
    if (vw <= 768) return vw / 700;
    return Math.min(vw / 850, 1.4);
  }

  async function renderPage(num) {
    if (rendering) return;
    rendering = true;

    const page = await pdfDoc.getPage(num);
    const scale = getScale();
    const viewport = page.getViewport({ scale });

    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

    // 기존 캔버스 제거 후 추가
    const existing = viewerBody.querySelector('canvas');
    if (existing) existing.remove();
    document.getElementById('loading').style.display = 'none';
    viewerBody.insertBefore(canvas, viewerBody.firstChild);
    viewerBody.scrollTop = 0;

    pageInfo.textContent = `${num} / ${totalPages}`;
    prevBtn.disabled = num <= 1;
    nextBtn.disabled = num >= totalPages;
    currentPage = num;
    rendering = false;
  }

  function changePage(delta) {
    const next = currentPage + delta;
    if (next < 1 || next > totalPages) return;
    renderPage(next);
  }

  if (!file) {
    document.getElementById('loading').innerHTML = '<div class="error-msg">파일 정보가 없습니다.</div>';
  } else {
    pdfjsLib.getDocument(file).promise.then(pdf => {
      pdfDoc = pdf;
      totalPages = pdf.numPages;
      renderPage(1);
    }).catch(err => {
      document.getElementById('loading').innerHTML = `<div class="error-msg">파일을 불러올 수 없습니다.<br>${err.message}</div>`;
    });
  }

  window.addEventListener('resize', () => { if (pdfDoc) renderPage(currentPage); });
</script>
</body>
</html>
